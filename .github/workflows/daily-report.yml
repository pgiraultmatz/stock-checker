name: Daily Stock Report

on:
  schedule:
    - cron: '0 7 * * *'  # Every day at 8am Paris time
  workflow_dispatch:

jobs:
  stock-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Run stock analysis
        run: |
          echo "📊 Generating stock market report..."
          CGO_ENABLED=0 go run main.go > report.html
          echo "✅ HTML report generated ($(wc -c < report.html) bytes)"
          echo ""
          echo "Preview (first 50 lines):"
          head -50 report.html

      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 📊 Stock Market Report - $(date +%d/%m/%Y)
          body: file://report.html
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: Stock Analyzer <${{ secrets.EMAIL_USERNAME }}>
          content_type: text/html
          secure: true