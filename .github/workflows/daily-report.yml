name: Daily Stock Report

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  stock-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Set date
        id: date
        run: echo "TODAY=$(date +'%d/%m/%Y')" >> $GITHUB_OUTPUT

      - name: Run stock analysis
        run: |
          echo "📊 Generating stock market report..."
          CGO_ENABLED=0 go run main.go > report.html
          echo "✅ HTML report generated"

      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 📊 Stock Market Report - ${{ steps.date.outputs.TODAY }}
          html_body: file://report.html
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: Stock Analyzer <${{ secrets.EMAIL_USERNAME }}>
          secure: true